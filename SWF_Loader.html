<!DOCTYPE html>
<html>
<head>
  <title>New Tab</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to right, #000, #333);
    }

    #gameSelect, #loadButton {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 5px 10px;
      font-family: monospace;
      cursor: pointer;
    }

    #gameSelect:hover, #loadButton:hover {
      background: rgba(0, 0, 0, 0.6);
    }

    #loadButton {
      margin-top: 10px;
    }

    #swfContainer {
      position: relative;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <select id="gameSelect"></select>
  <button id="loadButton" onclick="loadSWF()">Load Game</button>

  <div id="swfContainer"></div>

  <script>
    const gameDataUrl = 'https://cdn.jsdelivr.net/gh/script-netizen/swf@main/games.json';

    async function loadGames() {
      try {
        const response = await fetch(gameDataUrl);
        const games = await response.json();

        const gameSelect = document.getElementById('gameSelect');

        games.forEach(game => {
          const option = document.createElement('option');
          option.value = game.filename;
          option.textContent = game.name;
          gameSelect.appendChild(option);
        });
      } catch (error) {
        console.error('Error loading games:', error);
      }
    }

    function loadSWF() {
      const selectedGame = document.getElementById("gameSelect").value;
      const url = `https://cdn.jsdelivr.net/gh/script-netizen/swf@main/${selectedGame}.swf`;

      const embed = document.createElement("embed");
      embed.setAttribute("src", url);
      embed.setAttribute("width", "100%");
      embed.setAttribute("height", "100%");

      const swfContainer = document.getElementById("swfContainer");
      swfContainer.innerHTML = "";
      swfContainer.appendChild(embed);

      // Move the select box and button upwards
      const gameSelect = document.getElementById("gameSelect");
      const loadButton = document.getElementById("loadButton");
      gameSelect.style.top = "10px";
      loadButton.style.top = "50px";
    }

    loadGames();
  </script>
</body>
</html>
