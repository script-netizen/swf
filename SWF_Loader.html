<!DOCTYPE html>
<html>
<head>
  <title>New Tab</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to right, #000, #333); /* Add a cool background gradient */
    }

    #gameSelect {
      background: rgba(0, 0, 0, 0.8); /* Semi-transparent dark select box */
      color: #fff; /* White text */
      border: none;
      border-radius: 5px; /* Rounded corners */
      padding: 5px 10px;
      font-family: monospace; /* Monospace font for a retro look */
      cursor: pointer; /* Change cursor to pointer on hover */
    }

    #gameSelect:hover {
      background: rgba(0, 0, 0, 0.6); /* Darken on hover */
    }

    #loadButton {
      background: #333; /* Dark button background */
      color: #fff; /* White text */
      border: none;
      border-radius: 5px; /* Rounded corners */
      padding: 10px 20px;
      font-family: monospace; /* Monospace font for a retro look */
      cursor: pointer; /* Change cursor to pointer on hover */
      margin-top: 10px;
      display: block;
      margin-left: auto;
      margin-right: auto; /* Center the button horizontally */
    }

    #loadButton:hover {
      background: #222; /* Darken button on hover */
    }

    #swfContainer {
      width: 100%;
      height: calc(100vh - 80px); /* Subtract button height for proper positioning */
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <select id="gameSelect"></select>
  <button id="loadButton" onclick="loadSWF()">Load Game</button>

  <div id="swfContainer"></div>

  <script>
    const gameDataUrl = 'https://cdn.jsdelivr.net/gh/script-netizen/swf@main/games.json?v=' + Math.random();

    async function loadGames() {
      try {
        const response = await fetch(gameDataUrl);
        const games = await response.json();

        const gameSelect = document.getElementById('gameSelect');

        games.forEach(game => {
          const option = document.createElement('option');
          option.value = game.filename;
          option.textContent = game.name;
          gameSelect.appendChild(option);
        });
      } catch (error) {
        console.error('Error loading games:', error);
      }
    }

    function loadSWF() {
      const selectedGame = document.getElementById("gameSelect").value;
      const url = `https://cdn.jsdelivr.net/gh/script-netizen/swf@main/${selectedGame}.swf`;

      const embed = document.createElement("embed");
      embed.setAttribute("src", url);
      embed.setAttribute("width", "100%");
      embed.setAttribute("height", "100%");

      const swfContainer = document.getElementById("swfContainer");
      swfContainer.innerHTML = ""; // Clear any previous content
      swfContainer.appendChild(embed);
    }

    loadGames();
  </script>
</body>
</html>
